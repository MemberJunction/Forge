name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'package-lock.json'
      - 'packages/**'
      - 'vitest.config.ts'
  push:
    branches: [main]

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: cd packages/shared && npx tsc --build

      - name: Type-check main
        run: npx tsc --noEmit -p packages/main/tsconfig.json

      - name: Type-check renderer
        run: npx tsc --noEmit -p packages/renderer/tsconfig.json

      - name: Type-check preload
        run: npx tsc --noEmit -p packages/preload/tsconfig.json

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
