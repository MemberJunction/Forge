# MJ Forge regression test infrastructure.
#
# Bring up:    npm run test:harness:up
# Tear down:   npm run test:harness:down
# Status:      docker compose -f tests/docker-compose.test.yml ps
#
# All host ports are deliberately non-standard to avoid clashing with
# any database engines a developer may already have running locally.
name: forge-test

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: forge-test-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ForgeTest!Pa55"
      MSSQL_PID: "Developer"
    ports:
      - "11433:1433"
    networks: [testnet]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ForgeTest!Pa55' -C -Q 'SELECT 1' || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: forge-test-postgres
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge_test
    ports:
      - "15432:5432"
    networks: [testnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_test"]
      interval: 3s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8
    container_name: forge-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: forge
      MYSQL_DATABASE: forge_test
      MYSQL_USER: forge
      MYSQL_PASSWORD: forge
    ports:
      - "13306:3306"
    networks: [testnet]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uforge", "-pforge"]
      interval: 3s
      timeout: 3s
      retries: 30

  # Postgres reachable ONLY through the bastion. No host port published.
  postgres-private:
    image: postgres:16-alpine
    container_name: forge-test-postgres-private
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge_private
    networks: [bastionnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_private"]
      interval: 3s
      timeout: 3s
      retries: 30

  # SSH bastion host. Tests connect to localhost:12222 with the keypair at
  # tests/.ssh/id_test (generated by ensure-ssh-key.mjs on first run) and
  # tunnel to postgres-private:5432.
  bastion:
    image: linuxserver/openssh-server:latest
    container_name: forge-test-bastion
    environment:
      PUID: "1000"
      PGID: "1000"
      USER_NAME: forge
      PASSWORD_ACCESS: "false"
      SUDO_ACCESS: "false"
      PUBLIC_KEY_FILE: /pubkey/id_test.pub
      LOG_STDOUT: "true"
    ports:
      - "12222:2222"
    volumes:
      - ./.ssh/id_test.pub:/pubkey/id_test.pub:ro
      # Override the default config to flip AllowTcpForwarding on. SSH tunnel
      # integration tests need it to reach postgres-private.
      #
      # Mounted RW (no `:ro`) because linuxserver's s6 init script chmods/sed-edits
      # the file at startup. With `:ro` the init service crashes and sshd ends up
      # in a broken state even though it appears to be listening.
      - ./fixtures/ssh/sshd_config:/config/sshd/sshd_config
    networks: [testnet, bastionnet]
    depends_on:
      postgres-private:
        condition: service_healthy

networks:
  testnet:
  bastionnet:
